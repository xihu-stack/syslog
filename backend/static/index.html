<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>IP-Guard 行为研判中心</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/libs/react.js"></script>
<script src="/libs/react-dom.js"></script>
<script src="/libs/dayjs.js"></script>
<script src="/libs/antd.js"></script>
<script src="/libs/echarts.js"></script>
<script src="/libs/babel.js"></script>
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#eef2f9;color:#1f2937;font-family:"Microsoft YaHei",system-ui,sans-serif;}
  #root{min-height:100vh;}
  .logo{height:58px;display:flex;align-items:center;justify-content:center;text-align:center;color:#1677ff;font-size:15px;font-weight:700;line-height:1.25;border-bottom:1px solid #e8eef7;background:#fff;}
  .num{font-family:Consolas,"Courier New",monospace;}
  .tile{background:#fff;border:1px solid #e6ecf5;border-radius:10px;padding:16px 18px;cursor:pointer;transition:.18s;position:relative;overflow:hidden;box-shadow:0 1px 2px rgba(20,40,80,.04);}
  .tile:hover{border-color:#1677ff;box-shadow:0 6px 16px rgba(22,123,255,.16);transform:translateY(-2px);}
  .tile .v{font-size:28px;font-weight:700;color:#1677ff;}
  .tile.alert .v{color:#ff4d4f;}
  .tile .l{color:#8a94a6;font-size:12px;margin-top:6px;letter-spacing:1px;}
  .tile .arr{position:absolute;right:10px;bottom:8px;color:#bcc6d6;font-size:10px;}
  .risk{display:inline-block;padding:2px 9px;border-radius:4px;font-family:Consolas,monospace;font-weight:700;font-size:12px;}
  .legend span{display:inline-block;margin-right:14px;font-size:12px;color:#6b7280;}
  .swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle;}
  .tl{border-left:2px solid #1677ff;margin:8px 0 8px 4px;padding-left:14px;}
  .tl .it{margin:7px 0;font-size:13px;} .tl .t{color:#9aa3b2;font-size:12px;}
  .card{border:1px solid #e6ecf5 !important;border-radius:10px !important;box-shadow:0 1px 3px rgba(20,40,80,.05) !important;}
  .sec-title{color:#6b7280;font-size:12px;letter-spacing:1px;margin:6px 0 8px;}
  .st-tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;font-weight:600;}
</style>
</head>
<body>
<div id="root"><div style="padding:40px;text-align:center;color:#9aa3b2">加载中（本地库，约1~2秒）…</div></div>
<script>window.onerror=function(m,s,l,c,e){var d=document.getElementById('root');if(d)d.innerHTML='<div style="padding:30px;color:#c0392b;font-family:monospace;white-space:pre-wrap">前端出错：'+(e&&e.stack||m)+'\n\n请截图发我。</div>';return false;};</script>
<script type="text/babel">
const { Layout, Menu, Card, Row, Col, Table, Tag, Button, Input, Form, message, Select, Modal,
        Space, Upload, Divider, Typography, Badge, Empty, Descriptions, Alert, Radio, ConfigProvider, Statistic, Tooltip, Progress } = antd;
const { Sider, Header, Content } = Layout;
const { useState, useEffect, useRef } = React;

const LVL = s => (s==null)?{c:'#9aa3b2',l:'-'} : s>=86?{c:'#ff4d4f',l:'严重'} : s>=61?{c:'#fa8c16',l:'高危'} : s>=31?{c:'#faad14',l:'关注'} : {c:'#52c41a',l:'正常'};
const INTENT = {data_exfiltration:'数据外发', job_seeking:'求职离职', baseline_deviation:'行为偏离', policy_violation:'违规', normal_work:'正常', unknown:'未知'};
const DEV = {none:'无', minor:'轻微', major:'重大', severe:'严重', unknown:'未知'};
const STATUS_MAP = {NEW:{c:'#1677ff',t:'待处理'}, TRIAGING:{c:'#faad14',t:'处理中'}, CONFIRMED:{c:'#ff4d4f',t:'已确认'}, FP:{c:'#bfbfbf',t:'误报'}, CLOSED:{c:'#52c41a',t:'已关闭'}};
const STATUS_OPTS = [{label:'待处理',value:'NEW'},{label:'处理中',value:'TRIAGING'},{label:'已确认',value:'CONFIRMED'},{label:'误报',value:'FP'},{label:'已关闭',value:'CLOSED'}];
const fmt = s => (s||'').replace('T',' ').slice(0,16);
const GET = u=>fetch(u).then(r=>r.json());
const POST=(u,o)=>fetch(u,{method:'POST',...o}).then(r=>r.json());
const PUTJ=(u,b)=>fetch(u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json());
const DEL=(u)=>fetch(u,{method:'DELETE'}).then(r=>r.json());

function RiskBadge({s}){ const v=LVL(s); return <span className="risk" style={{background:v.c+'1a',color:v.c,border:'1px solid '+v.c+'66'}}>{s==null?'-':s} {v.l}</span>; }
function StatusTag({s}){ const v=STATUS_MAP[s]||{c:'#999',t:s}; return <span className="st-tag" style={{background:v.c+'1a',color:v.c}}>{v.t}</span>; }
function Legend(){ return <div className="legend">
  <span><i className="swatch" style={{background:'#52c41a'}}/>0-30 正常</span>
  <span><i className="swatch" style={{background:'#faad14'}}/>31-60 关注</span>
  <span><i className="swatch" style={{background:'#fa8c16'}}/>61-85 高危</span>
  <span><i className="swatch" style={{background:'#ff4d4f'}}/>86-100 严重</span>
</div>; }

function ProfilePage({user, goBack}){
  const [data,setData]=useState(null);
  const trendRef=useRef(), hoursRef=useRef(), actRef=useRef();
  useEffect(()=>{ if(user) GET('/api/employees/'+encodeURIComponent(user)).then(setData); },[user]);
  useEffect(()=>{
    if(!data) return;
    const vs=data.verdicts||[];
    if(vs.length&&trendRef.current){ const c=echarts.init(trendRef.current);
      const riskColors=vs.map(v=>v.risk_score>=86?'#ff4d4f':v.risk_score>=61?'#fa8c16':v.risk_score>=31?'#faad14':'#52c41a');
      c.setOption({tooltip:{trigger:'axis',formatter:p=>p[0].name+'<br/>风险分: <b>'+p[0].value+'</b>'},grid:{left:40,right:20,top:20,bottom:35},
        xAxis:{type:'category',data:vs.map(v=>(v.window_start||'').replace('T',' ').slice(5,16)),axisLabel:{color:'#9aa3b2',fontSize:9,rotate:30}},
        yAxis:{type:'value',max:100,axisLabel:{color:'#9aa3b2'}},
        series:[{type:'line',data:vs.map(v=>v.risk_score||0),smooth:true,areaStyle:{color:'#1677ff22'},lineStyle:{color:'#1677ff'},itemStyle:{color:function(p){return riskColors[p.dataIndex]||'#1677ff';}}}]});}
    const hrs=(data.profile||{}).active_hours_top||[];
    if(hrs.length&&hoursRef.current){ const c=echarts.init(hoursRef.current);
      const full=Array.from({length:24},(_,h)=>hrs.includes(h)?1:0);
      c.setOption({tooltip:{},grid:{left:30,right:15,top:15,bottom:30},
        xAxis:{type:'category',data:Array.from({length:24},(_,h)=>h+'时'),axisLabel:{color:'#9aa3b2',fontSize:9}},
        yAxis:{type:'value',show:false},
        series:[{type:'bar',data:full,itemStyle:{color:full.map(v=>v?'#1677ff':'#e6ecf5')}}]});}
    const evs=data.events||[];
    if(evs.length&&actRef.current){ const c=echarts.init(actRef.current);
      const actCnt={}; evs.forEach(e=>{ const a=e.action||'UNKNOWN'; actCnt[a]=(actCnt[a]||0)+1; });
      const top=Object.entries(actCnt).sort((a,b)=>b[1]-a[1]).slice(0,8);
      c.setOption({tooltip:{},grid:{left:80,right:20,top:15,bottom:30},
        xAxis:{type:'value',axisLabel:{color:'#9aa3b2'}},
        yAxis:{type:'category',data:top.map(t=>t[0]).reverse(),axisLabel:{color:'#6b7280',fontSize:11}},
        series:[{type:'bar',data:top.map(t=>t[1]).reverse(),itemStyle:{color:'#1677ff',borderRadius:[0,4,4,0]}}]});}
  },[data]);
  if(!data) return <Card className="card"><div style={{padding:40,textAlign:'center',color:'#9aa3b2'}}>加载中...</div></Card>;
  const vs=data.verdicts||[];
  const evs=data.events||[];
  const maxRisk=vs.length?Math.max(...vs.map(v=>v.risk_score||0)):0;
  const p=data.profile||{};
  const domains=p.common_domains||[];
  const sangforCnt=evs.filter(e=>e.source==='sangfor').length;
  const ipguardCnt=evs.filter(e=>e.source==='ipguard').length;
  const docCnt=evs.filter(e=>e.category==='DOC').length;
  const webCnt=evs.filter(e=>e.category==='WEB').length;
  const searchCnt=evs.filter(e=>e.category==='SEARCH').length;
  const usbUsed=(p.channels_used||[]).includes('USB');
  const netdiskUsed=(p.channels_used||[]).some(c=>c==='NETWORK');
  return (<div>
    <Button onClick={goBack} style={{marginBottom:12}}>← 返回</Button>
    <Typography.Title level={4} style={{marginBottom:16}}>{user} <RiskBadge s={maxRisk}/></Typography.Title>
    <Row gutter={16}>
      <Col span={5}><Card className="card"><Statistic title="历史事件" value={evs.length}/></Card></Col>
      <Col span={5}><Card className="card"><Statistic title="研判次数" value={vs.length}/></Card></Col>
      <Col span={5}><Card className="card"><Statistic title="最高风险" value={maxRisk} valueStyle={{color:LVL(maxRisk).c}}/></Card></Col>
      <Col span={5}><Card className="card"><Statistic title="样本天数" value={p.sample_count?(Math.round(p.sample_count/evs.length*10)/10):'-'}/></Card></Col>
      <Col span={4}><Card className="card"><Statistic title="常用通道" value={(p.channels_used||[]).join(' / ')||'-'}/></Card></Col>
    </Row>
    <Row gutter={16} style={{marginTop:16}}>
      <Col span={14}><Card className="card" title="风险趋势（点颜色=风险等级）" size="small"><div ref={trendRef} style={{height:220}}></div></Card></Col>
      <Col span={10}><Card className="card" title="活跃时段" size="small"><div ref={hoursRef} style={{height:220}}></div></Card></Col>
    </Row>
    <Row gutter={16} style={{marginTop:16}}>
      <Col span={8}>
    <Card className="card" title="事件分类" size="small">
      <Table size="small" pagination={false} dataSource={[
        {key:'doc',label:'文档操作',val:docCnt,color:'#1677ff'},
        {key:'web',label:'网页浏览',val:webCnt,color:'#52c41a'},
        {key:'search',label:'关键字搜索',val:searchCnt,color:'#faad14'},
      ]} columns={[
        {title:'类型',dataIndex:'label'},
        {title:'数量',dataIndex:'val',render:(v,r)=><span style={{fontWeight:600,color:r.color}}>{v}</span>},
        {title:'占比',render:(_,r)=>evs.length?<span style={{color:'#9aa3b2'}}>{Math.round(r.val/evs.length*100)}%</span>:'-'},
      ]}/>
      <div style={{marginTop:12}}>
        <Typography.Text type="secondary" style={{fontSize:12}}>操作类型 Top8：</Typography.Text>
        <div ref={actRef} style={{height:160,marginTop:4}}></div>
      </div>
    </Card>
      </Col>
      <Col span={8}>
    <Card className="card" title="数据来源" size="small">
      <Table size="small" pagination={false} dataSource={[
        {key:'sangfor',label:'深信服上网行为',val:sangforCnt,color:'#52c41a'},
        {key:'ipguard',label:'IP-Guard文档/网页',val:ipguardCnt,color:'#1677ff'},
      ]} columns={[
        {title:'来源',dataIndex:'label'},
        {title:'数量',dataIndex:'val',render:(v,r)=><span style={{fontWeight:600,color:r.color}}>{v}</span>},
        {title:'占比',render:(_,r)=>evs.length?<span style={{color:'#9aa3b2'}}>{Math.round(r.val/evs.length*100)}%</span>:'-'},
      ]}/>
      <div style={{marginTop:12,padding:8,background:'#f6f8fb',borderRadius:6}}>
        <Typography.Text type="secondary" style={{fontSize:12}}>外发通道：</Typography.Text>
        <div style={{marginTop:6}}>
          {usbUsed&&<Tag color="red" style={{marginBottom:4}}>USB/移动存储</Tag>}
          {netdiskUsed&&<Tag color="orange" style={{marginBottom:4}}>网络/共享磁盘</Tag>}
          {!usbUsed&&!netdiskUsed&&<Typography.Text type="secondary" style={{fontSize:12}}>无外发通道记录</Typography.Text>}
        </div>
      </div>
    </Card>
      </Col>
      <Col span={8}>
    <Card className="card" title="AI基线摘要" size="small">
      <Typography.Paragraph style={{fontSize:12,marginBottom:0}}>
        <Typography.Text code style={{fontSize:11}}>{data.profile_summary||'（样本不足，按通用可疑度判断）'}</Typography.Text>
      </Typography.Paragraph>
      <Divider style={{margin:'10px 0'}}/>
      <Descriptions column={1} size="small">
        <Descriptions.Item label="日均活动">{p.daily_doc_op_median||0}（峰值{p.daily_doc_op_max||0}）</Descriptions.Item>
        <Descriptions.Item label="行为类型">{(p.actions_seen||[]).join(', ')||'-'}</Descriptions.Item>
        <Descriptions.Item label="常接触词">{p.usual_keywords?(p.usual_keywords.slice(0,5).join(', ')):'-'}</Descriptions.Item>
      </Descriptions>
    </Card>
      </Col>
    </Row>
    <Card className="card" title="研判历史" size="small" style={{marginTop:16}}>
      <Table size="small" rowKey="window_start" pagination={{pageSize:8}} dataSource={vs}
        columns={[{title:'时间',dataIndex:'window_start',width:150,render:v=>(v||'').replace('T',' ').slice(0,16)},
          {title:'意图',dataIndex:'intent',width:120,render:v=><Tag color="blue">{INTENT[v]||v}</Tag>},
          {title:'风险',dataIndex:'risk_score',width:120,render:v=><RiskBadge s={v}/>},
          {title:'说明',dataIndex:'explanation',ellipsis:true}]}/>
    </Card>
    <Card className="card" title="最近行为（最多50条）" size="small" style={{marginTop:16}}>
      <div className="tl" style={{maxHeight:350,overflow:'auto'}}>
        {evs.map((e,i)=><div className="it" key={i}>
          <span className="t">{fmt(e.occurred_at)}</span> <b>[{e.action}]</b> {e.target_value}
          <div style={{color:'#9aa3b2',fontSize:12}}>
            通道:<Tag style={{marginLeft:4,fontSize:10}}>{e.channel||'本地'}</Tag>
            {e.application&&<span> 应用:{e.application}</span>}
            {e.size_bytes>0&&<span> {e.size_bytes}B</span>}
            <Tag style={{marginLeft:4,fontSize:10}} color={e.source==='sangfor'?'green':'blue'}>{e.source==='sangfor'?'深信服':'IP-Guard'}</Tag>
          </div>
        </div>)}
      </div>
    </Card>
    {domains.length>0&&<Card className="card" title="常访问域名（按频率）" size="small" style={{marginTop:16}}>
      <Space wrap size={[4,4]}>
        {domains.slice(0,40).map((d,i)=><Tag key={d} style={{fontSize:11}} color={i<5?'blue':'default'}>{d}</Tag>)}
      </Space>
    </Card>}
  </div>);
}

function App(){
  const [key,setKey]=useState('dashboard'); const [profileUser,setProfileUser]=useState(null);
  const pollDetect=()=>{
    const tick=()=>fetch('/api/detect/status').then(r=>r.json()).then(s=>{
      if(s.running){
        const pct = s.total ? Math.round(s.done/s.total*100) : 0;
        message.loading({content:'研判中 '+s.done+'/'+s.total+' ('+pct+'%)',key:'det',duration:0});
        setTimeout(tick,3000);
      } else {
        message.success({content:'研判完成：'+s.judged+' 窗口，告警 '+s.alerts,key:'det',duration:3});
        setTimeout(()=>location.reload(),1000);
      }
    });
    tick();
  };
  // 页面加载时自动检测是否有正在运行的研判
  useEffect(()=>{ fetch('/api/detect/status').then(r=>r.json()).then(s=>{ if(s.running&&s.total>0) pollDetect(); }); },[]);
  const uploadLog=f=>{ const fd=new FormData(); fd.append('file',f);
    message.loading({content:'导入中…',key:'up',duration:0});
    fetch('/api/ingest',{method:'POST',body:fd}).then(r=>r.json()).then(r=>{ message.success({content:'已导入 '+r.imported+' 条，开始研判…',key:'up',duration:2}); pollDetect(); }); return false; };
  return (
    <ConfigProvider theme={{token:{colorPrimary:'#1677ff',borderRadius:8}}}>
    <Layout style={{minHeight:'100vh'}}>
      <Sider width={200} style={{background:'#fff',borderRight:'1px solid #e8eef7'}}>
        <div className="logo">IP-Guard<br/>行为研判中心</div>
        <Menu mode="inline" selectedKeys={[key==='profile'?'alerts':key]} onClick={e=>setKey(e.key)} style={{borderRight:'none'}}
          items={[{key:'dashboard',label:'监控大屏'},{key:'computers',label:'用户视图'},{key:'alerts',label:'告警管理'},{key:'monitor',label:'系统监控'},{key:'config',label:'系统设置'}]}/>
      </Sider>
      <Layout>
        <Header style={{background:'#fff',borderBottom:'1px solid #e8eef7',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px'}}>
          <Typography.Title level={4} style={{margin:0}}>{({dashboard:'监控大屏',computers:'用户视图',alerts:'告警管理',config:'系统设置',profile:'用户画像'})[key]}</Typography.Title>
          <Space>
            <Upload showUploadList={false} beforeUpload={uploadLog}><Button type="primary">导入日志</Button></Upload>
            <Button onClick={()=>{ POST('/api/run'); pollDetect(); }}>重新研判</Button>
            <Button href="/api/export/alerts" target="_blank">导出告警</Button>
          </Space>
        </Header>
        <Content style={{margin:16}}>
          {key==='dashboard' && <Dashboard go={setKey}/>}
          {key==='computers' && <Computers goProfile={(u)=>{setProfileUser(u);setKey('profile');}}/>}
          {key==='alerts' && <Alerts goProfile={(u)=>{setProfileUser(u);setKey('profile');}}/>}
          {key==='config' && <Config/>}
          {key==='monitor' && <Monitor/>}
          {key==='profile' && profileUser && <ProfilePage user={profileUser} goBack={()=>{setKey('alerts');setProfileUser(null);}}/>}
        </Content>
      </Layout>
    </Layout>
    </ConfigProvider>
  );
}

function Dashboard({go}){
  const [st,setSt]=useState({}); const [vs,setVs]=useState([]); const [al,setAl]=useState([]); const [sys,setSys]=useState({});
  const pie=useRef(),bar=useRef(),trend=useRef();
  const load=async()=>{
    setSt(await GET('/api/stats'));
    setVs(await GET('/api/verdicts?limit=300'));
    setAl(await GET('/api/alerts?limit=300'));  // 饼图需要更多数据
    setSys(await GET('/api/system/stats'));
  };
  useEffect(()=>{ load(); },[]);
  useEffect(()=>{
    // 饼图数据：优先用 alerts，其次用 verdicts
    const pieData = al.length ? al : vs;
    if(pieData.length&&pie.current){ const cnt={}; pieData.forEach(v=>{const s=v.scenario||v.intent||'unknown';cnt[s]=(cnt[s]||0)+1;}); if(!Object.keys(cnt).length){ pie.current.innerHTML='<div style="text-align:center;color:#9aa3b2;padding-top:60px">暂无告警分布</div>'; } else { const c=echarts.init(pie.current);
      c.setOption({tooltip:{trigger:'item'},legend:{bottom:0,textStyle:{color:'#6b7280',fontSize:11}},
        color:['#ff4d4f','#fa8c16','#faad14','#1677ff','#52c41a'],
        series:[{type:'pie',radius:['42%','70%'],label:{color:'#4b5563'},data:Object.entries(cnt).map(([k,v])=>({name:INTENT[k]||k,value:v}))}]});}}
    if(vs.length&&bar.current){ const er={}; vs.forEach(v=>er[v.employee]=Math.max(er[v.employee]||0,v.risk_score));
      const top=Object.entries(er).sort((a,b)=>b[1]-a[1]).slice(0,10); if(!top.length){ bar.current.innerHTML='<div style="text-align:center;color:#9aa3b2;padding-top:60px">暂无高风险用户</div>'; } else { const c=echarts.init(bar.current);
      const barColors=top.map(x=>{const v=x[1];return v>=86?'#ff4d4f':v>=61?'#fa8c16':v>=31?'#faad14':'#52c41a';}).reverse();
      c.setOption({tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:p=>p[0].name+'：'+p[0].value+'分'},grid:{left:220,right:60},xAxis:{type:'value',max:100,axisLine:{lineStyle:{color:'#d0d7e3'}},axisLabel:{color:'#9aa3b2'}},
        yAxis:{type:'category',data:top.map(x=>x[0]).reverse(),axisLabel:{color:'#6b7280',fontSize:13,width:200,overflow:'truncate',ellipsis:'…'},axisLine:{lineStyle:{color:'#d0d7e3'}}},
        series:[{type:'bar',data:top.map(x=>x[1]).reverse(),itemStyle:{color:function(p){return barColors[p.dataIndex];},borderRadius:[0,4,4,0]},label:{show:true,position:'right',color:'#6b7280',formatter:'{c}分'}}]});}}
    if(vs.length&&trend.current){
      const bk={};
      vs.forEach(v=>{
        const t=new Date(v.window_start); if(isNaN(t))return;
        const k=Math.floor(t.getTime()/600000)*600000;
        if((v.risk_score||0)>=50){
          if(!bk[k])bk[k]=new Set();
          bk[k].add(v.employee);
        }
      });
      const ts=Object.keys(bk).sort((a,b)=>+a-+b);
      const vals=ts.map(t=>bk[t].size);
      if(!vals.length){ trend.current.innerHTML='<div style="text-align:center;color:#9aa3b2;padding-top:40px">暂无风险趋势数据</div>'; return; }
      const maxY=Math.max(...vals,1);
      const c=echarts.init(trend.current);
      c.setOption({tooltip:{trigger:'axis'},grid:{left:40,right:20,top:20,bottom:40},
        xAxis:{type:'category',data:ts.map(t=>{const d=new Date(+t);return (d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}),axisLabel:{color:'#9aa3b2',fontSize:9,rotate:30}},
        yAxis:{type:'value',max:maxY+1,axisLabel:{color:'#9aa3b2'}},
        series:[{type:'bar',data:vals,areaStyle:{color:'#1677ff22'},itemStyle:{color:'#1677ff',borderColor:'#fff'},name:'风险用户数'}]});}
  },[vs]);
  const SRC={"sangfor":"深信服","ipguard":"IP-Guard","":"未知"};
  const ev=(sys.events||{}), vd=(sys.verdicts||{}), al=(sys.alerts||{}), src=(sys.sources||{});
  return (<div>
    <Row gutter={16}>

      {(()=>{const v=st.employees||0;return <Col span={6}><div className="tile" onClick={()=>go('computers')}><div className="v num">{v}</div><div className="l">用户</div></div></Col>;})()}

      {(()=>{const v=st.alerts||0;return <Col span={6}><div className="tile alert" onClick={()=>go('alerts')}><div className="v num">{v}</div><div className="l">风险告警</div><div style={{fontSize:11,color:'#9aa3b2',marginTop:2}}>今日 {al.today||0} / 待处理 {(al.status||{}).NEW||0}</div></div></Col>;})()}
    </Row>
    <Row gutter={12} style={{marginTop:12}}>
      <Col span={5}><Card className="card" size="small" style={{padding:'6px 8px'}}><Statistic title="深信服" value={(src.total||{})['sangfor']||0} valueStyle={{fontSize:16}}/><div style={{fontSize:10,color:'#9aa3b2'}}>今日 {src.today&&src.today['sangfor']||0}</div></Card></Col>
      <Col span={5}><Card className="card" size="small" style={{padding:'6px 8px'}}><Statistic title="IP-Guard" value={(src.total||{})['ipguard']||0} valueStyle={{fontSize:16}}/><div style={{fontSize:10,color:'#9aa3b2'}}>今日 {src.today&&src.today['ipguard']||0}</div></Card></Col>
      <Col span={5}><Card className="card" size="small" style={{padding:'6px 8px'}}><Statistic title="已处理告警" value={((al.status||{}).CONFIRMED||0)+(al.status||{}).CLOSED||0} valueStyle={{fontSize:16,color:'#52c41a'}}/><div style={{fontSize:10,color:'#9aa3b2'}}>误报 {(al.status||{}).FP||0}</div></Card></Col>
      <Col span={5}><Card className="card" size="small" style={{padding:'6px 8px'}}><Statistic title="数据库" value={sys.db_size_mb||0} suffix="MB" valueStyle={{fontSize:16}}/><div style={{fontSize:10,color:'#9aa3b2'}}>WEB占比 {ev.web_ratio||0}%</div></Card></Col>
      <Col span={4}><Card className="card" size="small" style={{padding:'6px 8px'}}><Statistic title="豁免用户" value={sys.exceptions||0} valueStyle={{fontSize:16,color:'#52c41a'}}/><div style={{fontSize:10,color:'#9aa3b2'}}>已排除误报</div></Card></Col>
    </Row>
    <div style={{margin:'12px 2px'}}><Legend/></div>
    {(st.alerts>0&&st.verdicts>0&&(st.alerts/st.verdicts>0.15))&&<Alert type="warning" message="基线建设中（冷启动期）— 告警偏多属正常，随时间推移会趋于稳定" style={{marginBottom:12}} showIcon/>}
    <Row gutter={16}>
      <Col span={10}><Card className="card" title="风险意图分布" size="small"><div ref={pie} style={{height:240}}></div></Card></Col>
      <Col span={14}><Card className="card" title="高风险用户 TOP10" size="small"><div ref={bar} style={{height:240}}></div></Card></Col>
    </Row>
    <Card className="card" title="风险用户数趋势（按10分钟，风险≥50的人数）" size="small" style={{marginTop:16}}><div ref={trend} style={{height:160}}></div></Card>
    {(()=>{
      const ag={};(al||[]).forEach(a=>{if(!ag[a.employee])ag[a.employee]={key:a.employee,employee:a.employee,scenarios:[],maxRisk:0,summary:'',status:a.status};const g=ag[a.employee];const sc=INTENT[a.scenario]||a.scenario;if(!g.scenarios.includes(sc))g.scenarios.push(sc);if((a.risk_score||0)>g.maxRisk){g.maxRisk=a.risk_score;g.summary=a.summary;}});
      const ga=Object.values(ag).sort((a,b)=>b.maxRisk-a.maxRisk);
      return <Card className="card" style={{marginTop:16}} title={'最新告警（'+ga.length+'人）'} size="small">
        {ga.length? <Table size="small" rowKey="key" pagination={{pageSize:10}} dataSource={ga}
          columns={[{title:'用户',dataIndex:'employee',width:110},
            {title:'风险场景',dataIndex:'scenarios',render:v=><Space wrap size={[4,4]}>{v.map(s=><Tag key={s} style={{fontSize:11}} color={'blue'}>{s}</Tag>)}</Space>},
            {title:'风险',dataIndex:'maxRisk',width:90,render:v=><RiskBadge s={v}/>},
            {title:'状态',dataIndex:'status',width:80,render:v=><StatusTag s={v}/>},
            {title:'说明',dataIndex:'summary',render:v=><Tooltip title={v}><span style={{display:'inline-block',maxWidth:250,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',verticalAlign:'bottom'}}>{v||'-'}</span></Tooltip>}]}/> : <Empty description="暂无告警" style={{padding:20}}/>}
      </Card>;
    })()}
  </div>);
}

function Computers({goProfile}){
  const [rows,setRows]=useState([]); const [uq,setUq]=useState(''); const [riskFilter,setRiskFilter]=useState('all');
  const [lastUpd,setLastUpd]=useState(null);
  const load=async()=>{setRows(await GET('/api/computers'));setLastUpd(new Date());};
  useEffect(()=>{ load(); const t=setInterval(load,15000); return ()=>clearInterval(t); },[]);
  const summary={
    total: rows.length,
    alert: rows.filter(r=>(r.alert_count||0)>0).length,
    high: rows.filter(r=>(r.max_risk||0)>=61).length,
    clean: rows.filter(r=>(r.alert_count||0)===0).length,
  };
  const filtered=rows.filter(r=>{
    if(uq&&!(r.computer||'').toLowerCase().includes(uq.toLowerCase()))return false;
    if(riskFilter==='alert'&&!(r.alert_count>0))return false;
    if(riskFilter==='high'&&(r.max_risk||0)<61)return false;
    if(riskFilter==='clean'&&(r.alert_count>0))return false;
    return true;
  });
  return (<div>
    <Row gutter={12} style={{marginBottom:12}}>
      <Col span={6}><Card className="card" size="small"><Statistic title="总用户" value={summary.total}/></Card></Col>
      <Col span={6}><Card className="card" size="small"><Statistic title="有告警" value={summary.alert} valueStyle={{color:'#fa8c16'}}/></Card></Col>
      <Col span={6}><Card className="card" size="small"><Statistic title="高危(61+)" value={summary.high} valueStyle={{color:'#ff4d4f'}}/></Card></Col>
      <Col span={6}><Card className="card" size="small"><Statistic title="正常" value={summary.clean} valueStyle={{color:'#52c41a'}}/></Card></Col>
    </Row>
    <Card className="card" size="small">
      <Space style={{marginBottom:8}}>
        <Input.Search placeholder="搜索用户名" allowClear style={{width:180}} onChange={e=>setUq(e.target.value)} />
        <Select defaultValue="all" style={{width:110}} onChange={setRiskFilter}>
          <Select.Option value="all">全部</Select.Option>
          <Select.Option value="alert">有告警</Select.Option>
          <Select.Option value="high">高危61+</Select.Option>
          <Select.Option value="clean">无告警</Select.Option>
        </Select>
        <span style={{fontSize:11,color:'#9aa3b2'}}>每15秒自动刷新 {lastUpd&&'· '+lastUpd.toLocaleTimeString()}</span>
      </Space>
      <Table size="small" rowKey="computer" pagination={{pageSize:14}}
        dataSource={filtered}
        rowClassName={r=>{
          const risk=(r.max_risk||0);
          if(risk>=86)return 'background:#fff1f0';
          if(risk>=61)return 'background:#fff7e6';
          if((r.alert_count||0)>0)return 'background:#f6ffed';
          return '';
        }}
        onRow={r=>({onClick:()=>goProfile(r.computer),style:{cursor:'pointer'}})}
        columns={[
          {title:'用户',dataIndex:'computer',width:130,
            render:(v,r)=>{
              const rk=r.max_risk||0;
              return (<a style={{fontWeight:rk>=61?700:400,color:rk>=86?'#ff4d4f':rk>=61?'#fa8c16':rk>=31?'#faad14':'inherit'}}>{v}</a>);
            }},
          {title:'风险',dataIndex:'max_risk',width:90,render:v=><RiskBadge s={v}/>},
          {title:'告警',dataIndex:'alert_count',width:60,
            render:v=>v>0?<Tag color="red" style={{cursor:'pointer'}}>{v}条</Tag>:<span style={{color:'#d9d9d9'}}>—</span>},
          {title:'事件',dataIndex:'event_count',width:70,render:v=><span className="num" style={{color:'#6b7280'}}>{v}</span>},
          {title:'最近活动',dataIndex:'last_seen',width:130,render:fmt},
          {title:'',width:50,render:()=><span style={{color:'#bcc6d6',fontSize:11}}>▸</span>}
        ]}/>
    </Card>
  </div>);
}

function Alerts({goProfile}){
  const [rows,setRows]=useState([]); const [showAll,setShowAll]=useState(false); const [q,setQ]=useState(''); const [lvl,setLvl]=useState('all');
  const [scenario,setScenario]=useState('all');
  const [lastUpd,setLastUpd]=useState(null);
  const load=async()=>{setRows(await GET('/api/alerts?limit=200'));setLastUpd(new Date());};
  useEffect(()=>{ load(); const t=setInterval(load,15000); return ()=>clearInterval(t); },[]);
  const doConfirm=(e,vid)=>{ e.stopPropagation(); POST('/api/verdicts/'+vid+'/confirm').then(()=>{ message.success('已确认'); load(); }); };
  const [fpModal,setFpModal]=useState({open:false,vid:0,intent:'',emp:'',reason:'岗位需要',allScenarios:[]});
  const doFP=(e,r)=>{ e.stopPropagation(); setFpModal({open:true,vid:r.verdict_id,intent:r.intent,emp:r.employee,reason:'岗位需要',allScenarios:r.scenarios||[{label:r.intent}]}); };
  const submitFP=()=>{
    POST('/api/verdicts/'+fpModal.vid+'/false_positive?reason='+encodeURIComponent(fpModal.reason)+'&signal_type='+fpModal.intent+'&expires_days='+(fpModal.reason==='临时项目'?'30':'0')).then(()=>{ message.success('已标记误报，后续同类不再告警'); setFpModal({...fpModal,open:false}); load(); });
  };
  const SCENARIOS=[{label:'全部场景',value:'all'},{label:'数据外发',value:'data_exfiltration'},{label:'求职离职',value:'job_seeking'},{label:'行为偏离',value:'baseline_deviation'},{label:'违规',value:'policy_violation'}];
  return (<div>
    <div className="sec-title" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span>告警管理 · 按用户合并 · 点击用户名查看画像 · <span style={{fontSize:11,color:'#9aa3b2'}}>每15秒刷新{lastUpd&&' · '+lastUpd.toLocaleTimeString()}</span></span>
      <Space><Legend/>
        <label style={{fontSize:12,color:'#6b7280',cursor:'pointer',userSelect:'none'}}><input type="checkbox" checked={showAll} onChange={e=>setShowAll(e.target.checked)} style={{marginRight:4,cursor:'pointer'}}/>显示已处理</label>
      </Space>
    </div>
    <Card className="card" size="small">
      <Space style={{marginBottom:8}}>
        <Input.Search placeholder="搜索用户" allowClear style={{width:180}} onChange={e=>setQ(e.target.value)} />
        <Select value={lvl} style={{width:120}} onChange={setLvl}>
          <Select.Option value="all">全部风险</Select.Option>
          <Select.Option value="crit">严重86+</Select.Option>
          <Select.Option value="high">高危61-85</Select.Option>
          <Select.Option value="mid">关注31-60</Select.Option>
        </Select>
        <Select value={scenario} style={{width:130}} onChange={setScenario}>
          {SCENARIOS.map(s=><Select.Option key={s.value} value={s.value}>{s.label}</Select.Option>)}
        </Select>
      </Space>
      <Table size="small" rowKey="key" pagination={{pageSize:14}} dataSource={(()=>{
        const filtered=rows.filter(v=>{
          if(!showAll&&v.status!=='NEW')return false;
          if(q&&!(v.employee||'').toLowerCase().includes(q.toLowerCase()))return false;
          if(lvl==='crit'&&v.risk_score<86)return false;
          if(lvl==='high'&&(v.risk_score<61||v.risk_score>85))return false;
          if(lvl==='mid'&&(v.risk_score<31||v.risk_score>60))return false;
          if(scenario!=='all'&&v.scenario!==scenario)return false;
          return true;
        });
        const ag={};
        filtered.forEach(v=>{
          if(!ag[v.employee])ag[v.employee]={key:v.employee,employee:v.employee,scenarios:[],maxRisk:0,count:0,latest:v.window_start,summary:'',verdict_id:v.verdict_id,intent:v.scenario};
          const g=ag[v.employee];
          const sc=INTENT[v.scenario]||v.scenario;
          if(!g.scenarios.find(s=>s.label===sc))g.scenarios.push({label:sc,risk:v.risk_score});
          if((v.risk_score||0)>g.maxRisk){g.maxRisk=v.risk_score;g.summary=v.summary;g.verdict_id=v.verdict_id;g.intent=v.scenario;}
          g.count++; if(v.window_start>g.latest)g.latest=v.window_start;
        });
        return Object.values(ag).sort((a,b)=>b.maxRisk-a.maxRisk);
      })()}
        columns={[
          {title:'用户',dataIndex:'employee',width:100,render:v=><a onClick={(e)=>{e.stopPropagation();goProfile(v);}} style={{cursor:'pointer'}}>{v}</a>},
          {title:'风险场景',dataIndex:'scenarios',render:v=><Space wrap size={[4,4]}>{v.map(s=><Tag key={s.label} style={{fontSize:11}} color={s.risk>=86?'red':s.risk>=61?'orange':s.risk>=31?'gold':'blue'}>{s.label} {s.risk}</Tag>)}</Space>},
          {title:'次数',dataIndex:'count',width:50,render:v=><span className="num">{v}</span>},
          {title:'风险',dataIndex:'maxRisk',width:90,render:v=><RiskBadge s={v}/>},
          {title:'说明',dataIndex:'summary',render:v=><Tooltip title={v}><span style={{display:'inline-block',maxWidth:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',verticalAlign:'bottom'}}>{v}</span></Tooltip>},
          {title:'操作',width:120,render:(_,r)=>(<Space size={4}>
            <Button size="small" type="primary" ghost onClick={(e)=>doConfirm(e,r.verdict_id)}>确认</Button>
            <Button size="small" danger ghost onClick={(e)=>doFP(e,r)}>误报</Button>
          </Space>)}]}/>
    </Card>
    <Modal open={fpModal.open} title={'确认误报 — '+fpModal.emp} okText="确认误报" cancelText="取消" okType="danger"
      onCancel={()=>setFpModal({...fpModal,open:false})} onOk={submitFP}>
      <div style={{marginBottom:12}}>
        <Typography.Text strong>该用户的风险场景：</Typography.Text>
        <div style={{marginTop:6}}>
          {fpModal.allScenarios.map(s=>(
            <Tag key={s.label} color={s.label===(INTENT[fpModal.intent]||fpModal.intent)?"blue":"default"}
              style={{cursor:'pointer',marginBottom:4}}
              onClick={()=>setFpModal({...fpModal,intent:Object.keys(INTENT).find(k=>INTENT[k]===s.label)||s.label})}>
              {s.label}{s.label===(INTENT[fpModal.intent]||fpModal.intent)?" ✓":""}
            </Tag>
          ))}
        </div>
        <Typography.Text type="secondary" style={{fontSize:12}}>点击选择要豁免的场景（其他场景仍正常告警）</Typography.Text>
      </div>
      <div style={{marginBottom:8}}>
        <Typography.Text>误报原因（身份标签，AI后续会参考）：</Typography.Text>
      </div>
      <Select value={fpModal.reason} onChange={v=>setFpModal({...fpModal,reason:v})} style={{width:'100%'}}>
        <Select.Option value="HR岗位">HR岗位 — 招聘网站访问属正常（永久）</Select.Option>
        <Select.Option value="财务岗位">财务岗位 — 银行/财务网站属正常</Select.Option>
        <Select.Option value="运维岗位">运维岗位 — 远程控制/服务器属正常</Select.Option>
        <Select.Option value="销售岗位">销售岗位 — U盘拷文件给客户属正常</Select.Option>
        <Select.Option value="工作需要">工作需要（90天有效）</Select.Option>
        <Select.Option value="时间正常">时间正常 — 夜班/跨时区（永久）</Select.Option>
        <Select.Option value="临时项目">临时项目（30天有效）</Select.Option>
        <Select.Option value="误报">一般误报（不创建豁免）</Select.Option>
      </Select>
      <Alert type="info" showIcon style={{marginTop:12}}
        message={"将豁免「"+(INTENT[fpModal.intent]||fpModal.intent)+"」场景，其他场景仍正常监控。AI会记住此标签。"} />
    </Modal>
  </div>);
}

      <Col span={8}><Card className="card" title="最近报文" size="small">
        {sl.recent&&sl.recent.length>0 ? <div style={{fontSize:11,maxHeight:80,overflow:'auto'}}>
          {sl.recent.slice(0,4).map((m,i)=><div key={i} style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',marginBottom:2}}><b>{m.t}</b> {m.msg.slice(20,65)}</div>)}
        </div> : <div style={{color:'#9aa3b2',fontSize:12,padding:8}}>等待推送...</div>}
      </Card></Col>
    </Row>
  </div>);
}

function DictEditor({name,label,initial,onSave}){
  const [vals,setVals]=useState(initial||[]);
  useEffect(()=>{ setVals(initial||[]); },[initial]);
  return (<div style={{marginBottom:14}}>
    <Typography.Text strong style={{fontSize:13}}>{label}</Typography.Text>
    <Select mode="tags" style={{width:'100%'}} tokenSeparators={[',','，']} value={vals} onChange={setVals}/>
    <Button size="small" style={{marginTop:4}} onClick={()=>onSave(name,vals)}>保存</Button>
  </div>);
}
function Config(){
  const [cfg,setCfg]=useState({}); const [dicts,setDicts]=useState({}); const [syslog,setSyslog]=useState({}); const [saving,setSaving]=useState(false);
  const [form]=Form.useForm();
  const load=async()=>{ const c=await GET('/api/config'); setCfg(c); form.setFieldsValue({base_url:c.llm_base_url,active:c.llm_active||'qwen',qwen_model:(c.qwen||{}).model,deepseek_model:(c.deepseek||{}).model,deepseek_base_url:(c.deepseek||{}).base_url}); setDicts(await GET('/api/dicts')); setSyslog(await GET('/api/syslog/status')); };
  useEffect(()=>{ load(); const t=setInterval(()=>GET('/api/syslog/status').then(setSyslog),5000); return ()=>clearInterval(t); },[]);
  const saveLlm=async(v)=>{ setSaving(true); const body={llm_base_url:v.base_url,llm_active:v.active,llm_qwen_model:v.qwen_model,llm_deepseek_model:v.deepseek_model,llm_deepseek_base_url:v.deepseek_base_url||''};
    if(v.qwen_key) body.qwen_key=v.qwen_key; if(v.deepseek_key) body.deepseek_key=v.deepseek_key;
    await PUTJ('/api/config',body); setSaving(false); message.success('已保存'); load(); };
  const saveDict=async(n,val)=>{ await PUTJ('/api/dicts/'+n,val); message.success('已保存'); };
  const toggleSys=async(on)=>{ await POST('/api/syslog/'+(on?'start':'stop')); message.success(on?'已启动':'已停止'); load(); };
  const uploadLog=f=>{ const fd=new FormData(); fd.append('file',f); message.loading({content:'导入中…',key:'up',duration:0});
    fetch('/api/ingest',{method:'POST',body:fd}).then(r=>r.json()).then(r=>message.success({content:'已导入 '+r.imported+' 条',key:'up',duration:2})); return false; };
  const DM={sensitive_keywords:'敏感文件名关键词',recruitment_sites:'招聘网站域名',netdisk_domains:'网盘域名',personal_email_domains:'个人邮箱域名',job_search_terms:'求职搜索词',risk_search_terms:'高危搜索词'};
  return (<Row gutter={16}>
    <Col span={12}>
      <Card className="card" title="模型配置（活动优先·失败自动切换）" size="small" style={{marginBottom:16}}>
        <Form form={form} layout="vertical" onFinish={saveLlm}>
          <Form.Item label="接口地址" name="base_url"><Input placeholder="http://10.4.128.18:4000/v1"/></Form.Item>
          <Form.Item label="活动模型" name="active"><Radio.Group><Radio value="qwen">Qwen</Radio><Radio value="deepseek">DeepSeek</Radio></Radio.Group></Form.Item>
          <Form.Item label={'Qwen 模型（Key: '+((cfg.qwen||{}).key_masked||'无')+'）'} name="qwen_model"><Input placeholder="Qwen3-32B"/></Form.Item>
          <Form.Item label="Qwen 密钥（留空不改）" name="qwen_key"><Input.Password placeholder="sk-..."/></Form.Item>
          <Form.Item label={'DeepSeek 模型（Key: '+((cfg.deepseek||{}).key_masked||'无')+'）'} name="deepseek_model"><Input placeholder="deepseek"/></Form.Item>
          <Form.Item label="DeepSeek 接口地址" name="deepseek_base_url"><Input placeholder="http://10.0.20.249:4000/v1"/></Form.Item>
          <Form.Item label="DeepSeek 密钥（留空不改）" name="deepseek_key"><Input.Password placeholder="sk-..."/></Form.Item>
          <Button type="primary" htmlType="submit" loading={saving}>保存</Button>
        </Form>
      </Card>
      <Card className="card" title="Syslog 实时接收" size="small" style={{marginBottom:16}}>
        <div style={{marginBottom:8,color:'#6b7280',fontSize:13}}>
          监听地址：<b>{cfg.syslog_host||'0.0.0.0'}:{cfg.syslog_port||'8514'}</b>
        </div>
        <div style={{marginBottom:8}}>
          <Typography.Text style={{fontSize:12}}>告警推送地址（留空不推）</Typography.Text>
          <Input placeholder="https://oapi.dingtalk.com/robot/send?access_token=..." defaultValue={cfg.notify_webhook||''} onChange={e=>PUTJ('/api/config',{notify_webhook:e.target.value})} />
        </div>
        <div style={{marginBottom:8}}><Badge status={syslog.enabled?'success':'default'} text={syslog.enabled?'监听中（已收 '+syslog.count+' 条，入库 '+syslog.ingested+' 条）':'未启用'}/>
          <Button size="small" type="primary" ghost={syslog.enabled} danger={syslog.enabled} onClick={()=>toggleSys(!syslog.enabled)} style={{marginLeft:8}}>{syslog.enabled?'停止':'启动'}</Button></div>
        {syslog.recent&&syslog.recent.length? <div style={{background:'#f6f8fb',padding:8,fontSize:12,maxHeight:110,overflow:'auto',border:'1px solid #e6ecf5',borderRadius:6}}>
          {syslog.recent.map((m,i)=><div key={i} style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}><b>{m.t}</b> {m.from}: {m.msg.slice(0,80)}</div>)}</div>
          :<Typography.Text type="secondary" style={{fontSize:12}}>等待深信服推送（配好后自动接收→解析→研判）</Typography.Text>}
      </Card>
    </Col>
    <Col span={12}>
      <Card className="card" title="检测字典（可选，默认全自动）" size="small" extra={<Upload showUploadList={false} beforeUpload={uploadLog}><Button size="small" type="primary">导入日志</Button></Upload>}>
        {Object.keys(DM).map(n=><DictEditor key={n} name={n} label={DM[n]} initial={dicts[n]} onSave={saveDict}/>)}
        <Alert type="info" showIcon style={{marginTop:8}} message="检测默认全自动（不依赖这些词）。标为误报的行为会自动豁免，下次同类不再告警。"/>
      </Card>
    </Col>
  </Row>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
