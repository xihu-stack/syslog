version: '3.8'
services:
  app:
    build: .
    container_name: ipguard-ai
    ports:
      - "18000:8000"     # Web 界面（浏览器访问 18000）
      - "8514:8514/udp"  # Syslog 接收（深信服推 8514）
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    environment:
      - PYTHONIOENCODING=utf-8
