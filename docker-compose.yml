version: '3.8'
services:
  app:
    build: .
    container_name: ipguard-ai
    network_mode: host          # 直接用宿主网络（UDP syslog 最可靠，不走 Docker 端口映射）
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    environment:
      - PYTHONIOENCODING=utf-8
      - PORT=18000              # Web 端口（浏览器访问 18000）
